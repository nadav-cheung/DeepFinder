# SwiftLint configuration for DeepFinder
# Usage: swiftlint (system-installed, not SPM dependency)

included:
  - Sources
  - Tests

excluded:
  - .build
  - .claude
  - build

# Zero external dependencies - only default rules
analyzer_rules:
  - explicit_self
  - unused_declaration
  - unused_import

opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - extension_access_modifier
  - fallthrough
  - fatal_error_message
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - implicit_return
  - joined_default_parameter
  - let_var_whitespace
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - nimble_operator
  - no_extension_access_modifier
  - no_grouping_extension
  - nslocalizedstring_key
  - number_separator
  - operator_usage_whitespace
  - overridden_super_call
  - override_in_extension
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_method
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - prohibited_super_call
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - single_test_class
  - sorted_first_last
  - sorted_imports
  - static_operator
  - strict_fileprivate
  - switch_case_on_newline
  - toggle_bool
  - trailing_closure
  - type_contents_order
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - untyped_error_in_catch
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - xct_specific_matcher
  - yoda_condition

disabled_rules:
  - trailing_whitespace
  - todo
  - type_body_length
  - file_length
  - function_body_length
  - function_parameter_length

# Configuration
line_length:
  warning: 120
  error: 200

type_name:
  min_length: 3
  max_length: 50

identifier_name:
  min_length:
    warning: 2
  allowed_symbols: ["_"]

cyclomatic_complexity:
  warning: 20
  error: 30

custom_rules:
  no_print_statements:
    name: "No print() statements"
    regex: "\\bprint\\("
    match_kinds:
      - identifier
    message: "Use `os_log` / `Logger` instead of `print()`"
    severity: warning
