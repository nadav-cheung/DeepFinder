# Product Configuration
#
# 单一定义产品名的配置文件。所有代码和文档应引用此文件。
# 修改产品名只需改这一个文件。

[product]
name = "DeepFinder"              # 显示名称（用于 UI、帮助文本、man page）
slug = "deep-finder"             # URL-safe slug（用于 GitHub repo、Homebrew、目录名）
command = "deepfinder"            # CLI 命令名（用于二进制文件名、shell completions）
identifier = "com.nadav.deepfinder"  # macOS bundle identifier / LaunchAgent label

[paths]
data_dir = "~/.deep-finder"      # 数据目录（索引、配置、日志）
socket = "~/.deep-finder/ipc.sock"
pid_file = "~/.deep-finder/daemon.pid"
config_file = "~/.deep-finder/config.json"
history_file = "~/.deep-finder/history"
database = "~/.deep-finder/index.db"

[organization]
name = "nadav.com.cn"
author = "Nadav"
