# Dependabot keeps GitHub Actions versions current. DeepFinder is a Rust
# workspace; the only ecosystem tracked here is `github-actions` — the actions
# used in .github/workflows/.
#
# Cargo dependencies are intentionally NOT auto-bumped by dependabot: the
# workspace pins versions via Cargo.toml and records exact versions in
# Cargo.lock, which is reviewed/committed manually. Dependabot's `cargo`
# ecosystem would open one PR per crate bump for a small solo project, which
# is more noise than signal.
version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    # Group all action updates into one PR to minimize review noise.
    groups:
      github-actions:
        patterns: ["*"]
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
