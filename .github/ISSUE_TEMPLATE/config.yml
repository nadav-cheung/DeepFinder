# Issue chooser config. Surfaces contact links above the template list and
# discourages free-form issues so reports are actionable.
blank_issues_enabled: false
contact_links:
  - name: 📚 Documentation
    url: https://github.com/nadav-cheung/DeepFinder/blob/main/docs/index.md
    about: Check the docs (search syntax, CLI, GUI, AI) before filing — many questions are answered there.
  - name: 💬 Discussions
    url: https://github.com/nadav-cheung/DeepFinder/discussions
    about: Questions, ideas, and feature discussion belong in Discussions, not Issues.
  - name: 🗺️ Roadmap
    url: https://github.com/nadav-cheung/DeepFinder/blob/main/ROADMAP.md
    about: See what's shipped, what's next (Local RAG), and what's exploratory.
  - name: 🔒 Report a security vulnerability
    url: https://github.com/nadav-cheung/DeepFinder/security/advisories/new
    about: Report vulnerabilities privately via GitHub Security Advisories — do NOT open a public issue.
