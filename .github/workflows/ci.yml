name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# macos-26 (Tahoe) is not yet generally available on GitHub-hosted runners.
# When using this workflow before GitHub adds the macos-26 label, configure
# a self-hosted macOS 26 runner and replace `runs-on: macos-26` with the
# appropriate self-hosted label (e.g. `runs-on: [self-hosted, macos-26]`).

jobs:
  build-and-test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build

      - name: Test
        run: swift test
