name: Release

on:
  push:
    tags: ['v*']

# macos-26 (Tahoe) is not yet generally available on GitHub-hosted runners.
# When using this workflow before GitHub adds the macos-26 label, configure
# a self-hosted macOS 26 runner and replace `runs-on: macos-26` with the
# appropriate self-hosted label (e.g. `runs-on: [self-hosted, macos-26]`).

jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Build CLI (release)
        run: swift build -c release --product deepfinder

      - name: Build Daemon (release)
        run: swift build -c release --product deepfinder-daemon

      # ── Distribution archives ───────────────────────────────────────────
      # Package each binary as a standalone zip archive.  Zip preserves the
      # executable bit and is the standard format for macOS binary
      # distribution outside the App Store.

      - name: Create distribution archives
        run: |
          set -euo pipefail
          RELEASE_DIR=".build/release"

          # CLI
          ditto -c -k --keepParent "${RELEASE_DIR}/deepfinder" \
            "${RELEASE_DIR}/deepfinder.zip"

          # Daemon
          ditto -c -k --keepParent "${RELEASE_DIR}/deepfinder-daemon" \
            "${RELEASE_DIR}/deepfinder-daemon.zip"

      # ── SHA256 checksums ────────────────────────────────────────────────
      # Generate portable checksums (basename only, no path prefix) so that
      # `shasum -a 256 -c FILE.sha256` works from the directory containing
      # the downloaded file.

      - name: Generate SHA256 checksums
        run: |
          set -euo pipefail
          cd .build/release

          shasum -a 256 deepfinder       > deepfinder.sha256
          shasum -a 256 deepfinder-daemon > deepfinder-daemon.sha256

          shasum -a 256 deepfinder.zip       > deepfinder.zip.sha256
          shasum -a 256 deepfinder-daemon.zip > deepfinder-daemon.zip.sha256

      # ── Notarization ────────────────────────────────────────────────────
      # macOS Gatekeeper requires notarization for binaries distributed
      # outside the App Store.  This step is DISABLED by default — only
      # uncomment when the required Apple Developer secrets are configured.
      #
      # Prerequisites:
      # 1. Enroll in the Apple Developer Program ($99/year)
      # 2. Create a "Developer ID Application" certificate in Xcode or via
      #    Developer Portal > Certificates, Identifiers & Profiles
      # 3. Generate an App Store Connect API key with Developer access
      #    (App Store Connect > Users and Access > Integrations > API Keys)
      # 4. Store these secrets in the repo (Settings > Secrets and
      #    variables > Actions):
      #    - APPLE_DEVELOPER_ID_CERT: Developer ID Application certificate
      #      (base64-encoded .p12, exported with private key)
      #    - APPLE_DEVELOPER_ID_PASSWORD: .p12 export password
      #    - APPLE_NOTARY_ISSUER_ID: App Store Connect API Issuer ID
      #      (UUID from the API Keys page)
      #    - APPLE_NOTARY_KEY_ID: App Store Connect API Key ID
      #      (10-char alphanumeric from the API Keys page)
      #    - APPLE_NOTARY_PRIVATE_KEY: App Store Connect API private key
      #      (.p8 file contents, including BEGIN/END lines)
      #    - APPLE_TEAM_ID: Your Apple Developer Team ID (optional;
      #      required only if your account belongs to multiple teams)
      # 5. Change `if: false` to `if: true` below.
      #
      # Full documentation: docs/RELEASE.md
      # ────────────────────────────────────────────────────────────────────

      - name: Notarize binaries
        if: false  # Set to `true` after configuring Apple Developer secrets
        run: |
          set -euo pipefail

          # ── Import signing certificate ──────────────────────────────
          echo "${APPLE_DEVELOPER_ID_CERT}" | base64 --decode > developer_id.p12
          security create-keychain -p "" signing.keychain
          security default-keychain -s signing.keychain
          security unlock-keychain -p "" signing.keychain
          security import developer_id.p12 \
            -k signing.keychain \
            -P "${APPLE_DEVELOPER_ID_PASSWORD}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "" signing.keychain

          TEAM_ARG=""
          if [ -n "${APPLE_TEAM_ID:-}" ]; then
            TEAM_ARG="--team-id ${APPLE_TEAM_ID}"
          fi

          # ── Code-sign with hardened runtime ─────────────────────────
          # Daemon: needs entitlements for disable-library-validation
          codesign --force --options runtime --timestamp \
            --entitlements packaging/entitlements/deepfinder-daemon.plist \
            --sign "Developer ID Application" \
            .build/release/deepfinder-daemon

          # CLI: hardened runtime, no special entitlements needed
          codesign --force --options runtime --timestamp \
            --sign "Developer ID Application" \
            .build/release/deepfinder

          # ── Verify signatures ───────────────────────────────────────
          codesign --verify --verbose .build/release/deepfinder
          codesign --verify --verbose .build/release/deepfinder-daemon

          # ── Rebuild distribution archives with signed binaries ──────
          ditto -c -k --keepParent .build/release/deepfinder \
            .build/release/deepfinder.zip
          ditto -c -k --keepParent .build/release/deepfinder-daemon \
            .build/release/deepfinder-daemon.zip

          # ── Submit to Apple notary service ──────────────────────────
          xcrun notarytool submit .build/release/deepfinder.zip \
            --issuer "${APPLE_NOTARY_ISSUER_ID}" \
            --key-id "${APPLE_NOTARY_KEY_ID}" \
            --key <(echo "${APPLE_NOTARY_PRIVATE_KEY}") \
            ${TEAM_ARG} \
            --wait --timeout 30m

          xcrun notarytool submit .build/release/deepfinder-daemon.zip \
            --issuer "${APPLE_NOTARY_ISSUER_ID}" \
            --key-id "${APPLE_NOTARY_KEY_ID}" \
            --key <(echo "${APPLE_NOTARY_PRIVATE_KEY}") \
            ${TEAM_ARG} \
            --wait --timeout 30m

          # ── Staple the notarization ticket to the binaries ──────────
          xcrun stapler staple .build/release/deepfinder
          xcrun stapler staple .build/release/deepfinder-daemon

          # ── Rebuild zips with stapled binaries ──────────────────────
          ditto -c -k --keepParent .build/release/deepfinder \
            .build/release/deepfinder.zip
          ditto -c -k --keepParent .build/release/deepfinder-daemon \
            .build/release/deepfinder-daemon.zip

          # ── Verify notarization ─────────────────────────────────────
          spctl --assess --verbose --type execute \
            .build/release/deepfinder
          spctl --assess --verbose --type execute \
            .build/release/deepfinder-daemon

          # ── Re-generate checksums for signed binaries ───────────────
          cd .build/release
          shasum -a 256 deepfinder            > deepfinder.sha256
          shasum -a 256 deepfinder-daemon      > deepfinder-daemon.sha256
          shasum -a 256 deepfinder.zip         > deepfinder.zip.sha256
          shasum -a 256 deepfinder-daemon.zip   > deepfinder-daemon.zip.sha256

          # ── Clean up ───────────────────────────────────────────────
          rm -f developer_id.p12
          security delete-keychain signing.keychain

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            .build/release/deepfinder.zip
            .build/release/deepfinder.zip.sha256
            .build/release/deepfinder-daemon.zip
            .build/release/deepfinder-daemon.zip.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
