name: Docs Quality

on:
  push:
    paths:
      - 'docs/**'
      - '*.md'
  pull_request:
    paths:
      - 'docs/**'
      - '*.md'

# Linting and link-checking only read the repo; no write access needed.
permissions:
  contents: read

jobs:
  lint:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: |
            docs/**/*.md
            *.md
          config: |
            default: true
            # Allow longer lines in tables (comparison matrix, etc.)
            MD013:
              line_length: 200
              tables: false
            # Allow duplicate headings (troubleshooting sections use symptom names)
            MD024:
              siblings_only: true
            # Allow inline HTML for anchor links
            MD033: false
            # Allow bare URLs
            MD034: false

  links:
    name: Check Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check internal links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --base .
            --no-progress
            --exclude-path 'node_modules'
            --exclude 'https://github.com/nadav/deepfinder/(issues|discussions|releases)'
            --exclude 'http://localhost:7654'
            --require-https
            'docs/**/*.md'
            '*.md'
          fail: true
